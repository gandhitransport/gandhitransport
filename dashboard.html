<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gandhi – Tableau de bord conducteur</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; font-size: 16px; background: #f5f5f5; color: #333; }
    header { background: #1a6b3c; color: white; padding: 16px 20px; display: flex; align-items: center; justify-content: space-between; }
    header h1 { font-size: 1.4rem; }
    header a { color: white; font-size: 0.85rem; text-decoration: underline; }
    .container { max-width: 600px; margin: 0 auto; padding: 20px; }
    h2 { color: #1a6b3c; font-size: 1.3rem; margin-bottom: 16px; }
    h3 { color: #1a6b3c; font-size: 1.1rem; margin: 24px 0 12px; }
    label { display: block; font-size: 0.9rem; color: #555; margin-bottom: 4px; margin-top: 12px; }
    input[type="text"], input[type="date"], input[type="time"], input[type="number"] {
      width: 100%; padding: 11px 14px; border: 1.5px solid #ccc;
      border-radius: 8px; font-size: 16px; background: white;
    }
    input:focus { outline: none; border-color: #1a6b3c; }
    .row { display: flex; gap: 12px; }
    .row > div { flex: 1; }
    button[type="submit"] {
      margin-top: 20px; width: 100%; padding: 14px;
      background: #1a6b3c; color: white; border: none;
      border-radius: 8px; font-size: 1rem; font-weight: bold; cursor: pointer;
    }
    button[type="submit"]:hover { background: #145530; }
    .annonce-card {
      background: white; border-radius: 10px; padding: 14px 16px;
      margin-bottom: 12px; border-left: 4px solid #1a6b3c;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }
    .annonce-card h4 { font-size: 1rem; color: #1a6b3c; margin-bottom: 6px; }
    .annonce-card p { font-size: 0.9rem; color: #666; margin-bottom: 3px; }
    .annonce-card .badge {
      display: inline-block; background: #e8f5e9; color: #1a6b3c;
      font-size: 0.8rem; padding: 2px 8px; border-radius: 12px; font-weight: bold;
    }
    .empty { text-align: center; padding: 30px 0; color: #999; font-size: 0.95rem; }
    .info-box { background: #fff3cd; border: 1px solid #ffc107; border-radius: 8px; padding: 12px 14px; font-size: 0.88rem; margin-top: 12px; }
    @media (max-width: 600px) {
      body { font-size: 14px; }
      h2 { font-size: 1.15rem; }
      .row { flex-direction: column; gap: 0; }
      button, input { font-size: 16px; }
    }
  </style>
</head>
<body>

<header>
  <h1>🚗 Gandhi – Mon tableau de bord</h1>
  <a href="index.html">← Déconnexion</a>
</header>

<div class="container">

  <!-- ===================== FORMULAIRE ANNONCE ===================== -->
  <h2>Publier une annonce de trajet</h2>

  <form id="annonceForm">
    <div class="row">
      <div>
        <label>Ville départ *</label>
        <input type="text" id="villeDep" placeholder="Ex : Dakar" required>
      </div>
      <div>
        <label>Quartier départ *</label>
        <input type="text" id="quartierDep" placeholder="Ex : Plateau" required>
      </div>
    </div>

    <div class="row">
      <div>
        <label>Ville arrivée *</label>
        <input type="text" id="villeArr" placeholder="Ex : Thiès" required>
      </div>
      <div>
        <label>Quartier arrivée</label>
        <input type="text" id="quartierArr" placeholder="Optionnel">
      </div>
    </div>

    <div class="row">
      <div>
        <label>Date *</label>
        <input type="date" id="date" required>
      </div>
      <div>
        <label>Heure *</label>
        <input type="time" id="heure" required>
      </div>
    </div>

    <div class="row">
      <div>
        <label>Nombre de places *</label>
        <input type="number" id="places" placeholder="Ex : 3" min="1" max="8" required>
      </div>
      <div>
        <label>Prix par passager (FCFA) *</label>
        <input type="number" id="prix" placeholder="Ex : 2500" min="0" required>
      </div>
    </div>

    <label>Marque du véhicule *</label>
    <input type="text" id="marque" placeholder="Ex : Toyota Corolla" required>

    <div class="info-box">
      💳 Publication : 100 FCFA par annonce (paiement Wave / Orange Money – à venir)
    </div>

    <button type="submit">Publier mon trajet →</button>
  </form>

  <!-- ===================== MES ANNONCES ===================== -->
  <div id="mesAnnonces"></div>

</div>

<!-- ===================== SDK FIREBASE ===================== -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
  import { getAuth, signInWithPhoneNumber, RecaptchaVerifier } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";
  import { getFirestore, collection, addDoc, query, where, getDocs, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";
  import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-storage.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCEQCpB69WR4qRAbQ9qfIcCsPRm9-l_Lw8",
    authDomain: "gandhi-aa31c.firebaseapp.com",
    projectId: "gandhi-aa31c",
    storageBucket: "gandhi-aa31c.firebasestorage.app",
    messagingSenderId: "529079046689",
    appId: "1:529079046689:web:f939f9ebf4ad1f0cad4960"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);
  const storage = getStorage(app);

  // Rendre disponible globalement
  window.db = db; window.auth = auth; window.storage = storage;
  window.signInWithPhoneNumber = signInWithPhoneNumber;
  window.RecaptchaVerifier = RecaptchaVerifier;
  window.collection = collection; window.addDoc = addDoc;
  window.setDoc = setDoc; window.doc = doc;
  window.getDoc = getDoc; window.getDocs = getDocs;
  window.query = query; window.where = where;
  window.ref = ref; window.uploadBytes = uploadBytes;
  window.getDownloadURL = getDownloadURL;

  // ===== VÉRIFICATION CONDUCTEUR CONNECTÉ =====
  const conducteurId = localStorage.getItem('conducteur_uid');
  if (!conducteurId) {
    alert('Veuillez vous connecter en tant que conducteur.');
    window.location.href = 'index.html';
  }

  // ===== FORMULAIRE PUBLICATION ANNONCE =====
  const annonceForm = document.getElementById('annonceForm');

  annonceForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    const submitBtn = annonceForm.querySelector('button[type="submit"]');
    submitBtn.textContent = 'Publication en cours…';
    submitBtn.disabled = true;

    const annonce = {
      conducteur_id: conducteurId,
      ville_depart: document.getElementById('villeDep').value.trim(),
      quartier_depart: document.getElementById('quartierDep').value.trim(),
      ville_arrivee: document.getElementById('villeArr').value.trim(),
      quartier_arrivee: document.getElementById('quartierArr').value.trim() || '',
      date_depart: document.getElementById('date').value,
      heure_depart: document.getElementById('heure').value,
      places_total: parseInt(document.getElementById('places').value),
      prix_par_passager: parseInt(document.getElementById('prix').value),
      marque_vehicule: document.getElementById('marque').value.trim(),
      prise_en_charge_domicile: true,
      rayon_detour_km: 2,
      status: 'active',
      created_at: new Date().toISOString()
    };

    try {
      await addDoc(collection(db, 'annonces'), annonce);
      alert('✅ Annonce publiée avec succès !');
      annonceForm.reset();
      afficherMesAnnonces();
    } catch (error) {
      console.error(error);
      alert('Erreur lors de la publication : ' + error.message);
    }

    submitBtn.textContent = 'Publier mon trajet →';
    submitBtn.disabled = false;
  });

  // ===== AFFICHAGE DES ANNONCES DU CONDUCTEUR =====
  async function afficherMesAnnonces() {
    const container = document.getElementById('mesAnnonces');
    container.innerHTML = '<h3>Mes annonces publiées</h3>';

    try {
      const q = query(collection(db, 'annonces'), where('conducteur_id', '==', conducteurId));
      const snapshot = await getDocs(q);

      if (snapshot.empty) {
        container.innerHTML += '<div class="empty">Aucune annonce publiée pour le moment.</div>';
        return;
      }

      snapshot.forEach(docSnap => {
        const a = docSnap.data();
        const statusBadge = a.status === 'active' ? '🟢 Active' : '🔴 Inactive';
        container.innerHTML += `
          <div class="annonce-card">
            <h4>📍 ${a.ville_depart} → ${a.ville_arrivee}</h4>
            <p>📅 ${a.date_depart} à ${a.heure_depart}</p>
            <p>💺 ${a.places_total} place(s) · 💰 ${a.prix_par_passager} FCFA / passager</p>
            <p>🚗 ${a.marque_vehicule}</p>
            <span class="badge">${statusBadge}</span>
          </div>
        `;
      });
    } catch (error) {
      container.innerHTML += '<div class="empty">Erreur de chargement.</div>';
      console.error(error);
    }
  }

  afficherMesAnnonces();
</script>

</body>
</html>
