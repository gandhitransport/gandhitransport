<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gandhi – Rechercher un trajet</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; font-size: 16px; background: #f5f5f5; color: #333; }
    header { background: #1a6b3c; color: white; padding: 16px 20px; display: flex; align-items: center; justify-content: space-between; }
    header h1 { font-size: 1.4rem; }
    header a { color: white; font-size: 0.85rem; text-decoration: underline; }
    .container { max-width: 600px; margin: 0 auto; padding: 20px; }
    h2 { color: #1a6b3c; font-size: 1.3rem; margin-bottom: 16px; }
    .search-box {
      background: white; border-radius: 12px; padding: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08); margin-bottom: 24px;
    }
    label { display: block; font-size: 0.9rem; color: #555; margin-bottom: 4px; margin-top: 12px; }
    input[type="text"] {
      width: 100%; padding: 11px 14px; border: 1.5px solid #ccc;
      border-radius: 8px; font-size: 16px; background: #fafafa;
    }
    input:focus { outline: none; border-color: #1a6b3c; background: white; }
    .search-row { display: flex; gap: 12px; align-items: flex-end; margin-top: 4px; }
    .search-row > div { flex: 1; }
    #searchBtn {
      padding: 12px 22px; background: #1a6b3c; color: white;
      border: none; border-radius: 8px; font-size: 1rem; font-weight: bold;
      cursor: pointer; white-space: nowrap; margin-bottom: 0;
    }
    #searchBtn:hover { background: #145530; }
    #resetBtn {
      padding: 12px 16px; background: #eee; color: #555;
      border: none; border-radius: 8px; font-size: 0.9rem; cursor: pointer;
    }
    #resetBtn:hover { background: #ddd; }
    .annonce-card {
      background: white; border-radius: 10px; padding: 16px;
      margin-bottom: 14px; border-left: 4px solid #1a6b3c;
      box-shadow: 0 1px 5px rgba(0,0,0,0.08);
    }
    .annonce-card h3 { font-size: 1.05rem; color: #1a6b3c; margin-bottom: 8px; }
    .annonce-card p { font-size: 0.9rem; color: #555; margin-bottom: 4px; }
    .annonce-card .conducteur { font-size: 0.88rem; color: #777; padding-top: 6px; border-top: 1px solid #eee; margin-top: 8px; }
    .contact-btn {
      display: inline-block; margin-top: 10px; padding: 10px 20px;
      background: #25D366; color: white; border: none; border-radius: 20px;
      font-size: 0.9rem; font-weight: bold; cursor: pointer; text-decoration: none;
    }
    .contact-btn:hover { background: #1ebe5d; }
    .loading { text-align: center; padding: 30px; color: #999; }
    .empty { text-align: center; padding: 40px 20px; color: #aaa; }
    .empty span { font-size: 2.5rem; display: block; margin-bottom: 10px; }
    .result-count { font-size: 0.9rem; color: #777; margin-bottom: 14px; }
    @media (max-width: 600px) {
      body { font-size: 14px; }
      h2 { font-size: 1.15rem; }
      .search-row { flex-direction: column; }
      #searchBtn, #resetBtn { width: 100%; }
      button, input { font-size: 16px; }
    }
  </style>
</head>
<body>

<header>
  <h1>🔍 Gandhi – Recherche</h1>
  <a href="index.html">← Accueil</a>
</header>

<div class="container">
  <h2>Trouver un trajet</h2>

  <!-- ===================== BARRE DE RECHERCHE ===================== -->
  <div class="search-box">
    <div class="search-row">
      <div>
        <label>Ville de départ</label>
        <input type="text" id="searchDepart" placeholder="Ex : Dakar">
      </div>
      <div>
        <label>Ville d'arrivée</label>
        <input type="text" id="searchArrivee" placeholder="Ex : Thiès">
      </div>
    </div>
    <div class="search-row" style="margin-top: 14px;">
      <button id="searchBtn">🔍 Rechercher</button>
      <button id="resetBtn" onclick="resetSearch()">↺ Tout afficher</button>
    </div>
  </div>

  <!-- ===================== RÉSULTATS ===================== -->
  <div id="resultCount" class="result-count"></div>
  <div id="annoncesList"></div>
</div>

<!-- ===================== SDK FIREBASE ===================== -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
  import { getAuth, signInWithPhoneNumber, RecaptchaVerifier } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";
  import { getFirestore, collection, addDoc, query, where, getDocs, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";
  import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-storage.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCEQCpB69WR4qRAbQ9qfIcCsPRm9-l_Lw8",
    authDomain: "gandhi-aa31c.firebaseapp.com",
    projectId: "gandhi-aa31c",
    storageBucket: "gandhi-aa31c.firebasestorage.app",
    messagingSenderId: "529079046689",
    appId: "1:529079046689:web:f939f9ebf4ad1f0cad4960"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);
  const storage = getStorage(app);

  // Rendre disponible globalement
  window.db = db; window.auth = auth; window.storage = storage;
  window.signInWithPhoneNumber = signInWithPhoneNumber;
  window.RecaptchaVerifier = RecaptchaVerifier;
  window.collection = collection; window.addDoc = addDoc;
  window.setDoc = setDoc; window.doc = doc;
  window.getDoc = getDoc; window.getDocs = getDocs;
  window.query = query; window.where = where;
  window.ref = ref; window.uploadBytes = uploadBytes;
  window.getDownloadURL = getDownloadURL;

  const annoncesList = document.getElementById('annoncesList');
  const resultCount = document.getElementById('resultCount');

  // ===== CHARGEMENT ET AFFICHAGE DES ANNONCES =====
  async function loadAnnonces(filtreDepart = '', filtreArrivee = '') {
    annoncesList.innerHTML = '<div class="loading">Chargement des trajets…</div>';
    resultCount.textContent = '';

    try {
      let q;
      if (filtreDepart && filtreArrivee) {
        q = query(collection(db, 'annonces'),
          where('ville_depart', '==', filtreDepart),
          where('ville_arrivee', '==', filtreArrivee),
          where('status', '==', 'active'));
      } else if (filtreDepart) {
        q = query(collection(db, 'annonces'),
          where('ville_depart', '==', filtreDepart),
          where('status', '==', 'active'));
      } else if (filtreArrivee) {
        q = query(collection(db, 'annonces'),
          where('ville_arrivee', '==', filtreArrivee),
          where('status', '==', 'active'));
      } else {
        q = query(collection(db, 'annonces'), where('status', '==', 'active'));
      }

      const snapshot = await getDocs(q);
      annoncesList.innerHTML = '';

      if (snapshot.empty) {
        resultCount.textContent = '0 trajet trouvé';
        annoncesList.innerHTML = `
          <div class="empty">
            <span>🚗</span>
            Aucun trajet disponible pour cette recherche.<br>
            Réessayez avec d'autres villes.
          </div>`;
        return;
      }

      resultCount.textContent = `${snapshot.size} trajet(s) trouvé(s)`;

      for (const docSnap of snapshot.docs) {
        const a = docSnap.data();

        // Récupérer les infos du conducteur
        let conducteur = { prenom: 'Anonyme', nom: '', phone: '' };
        try {
          const conducteurDoc = await getDoc(doc(db, 'conducteurs', a.conducteur_id));
          if (conducteurDoc.exists()) conducteur = conducteurDoc.data();
        } catch (e) { /* conducteur introuvable */ }

        const nomComplet = `${conducteur.prenom} ${conducteur.nom}`.trim();
        const div = document.createElement('div');
        div.className = 'annonce-card';
        div.innerHTML = `
          <h3>📍 ${a.ville_depart} → ${a.ville_arrivee}</h3>
          <p>📅 ${a.date_depart} à ${a.heure_depart}</p>
          <p>💺 ${a.places_total} place(s) disponible(s)</p>
          <p>💰 ${a.prix_par_passager} FCFA par passager</p>
          <p>🚗 Véhicule : ${a.marque_vehicule}</p>
          ${a.quartier_depart ? `<p>📌 Départ quartier : ${a.quartier_depart}</p>` : ''}
          ${a.quartier_arrivee ? `<p>📌 Arrivée quartier : ${a.quartier_arrivee}</p>` : ''}
          <div class="conducteur">👤 Conducteur : ${nomComplet}</div>
          ${conducteur.phone
            ? `<a class="contact-btn" href="tel:${conducteur.phone}">📞 Appeler le conducteur</a>`
            : '<p style="color:#aaa;font-size:0.85rem;margin-top:8px;">Contact indisponible</p>'
          }
        `;
        annoncesList.appendChild(div);
      }

    } catch (error) {
      annoncesList.innerHTML = '<div class="empty">Erreur de chargement. Réessayez.</div>';
      console.error(error);
    }
  }

  // ===== BOUTON RECHERCHE =====
  document.getElementById('searchBtn').addEventListener('click', () => {
    const depart = document.getElementById('searchDepart').value.trim();
    const arrivee = document.getElementById('searchArrivee').value.trim();
    loadAnnonces(depart, arrivee);
  });

  // ===== RESET =====
  window.resetSearch = () => {
    document.getElementById('searchDepart').value = '';
    document.getElementById('searchArrivee').value = '';
    loadAnnonces();
  };

  // Touche Entrée pour déclencher la recherche
  ['searchDepart', 'searchArrivee'].forEach(id => {
    document.getElementById(id).addEventListener('keydown', (e) => {
      if (e.key === 'Enter') document.getElementById('searchBtn').click();
    });
  });

  // Chargement initial de toutes les annonces
  loadAnnonces();
</script>

</body>
</html>
